<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Tier List</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(180deg, #0b1220, #030712);
  color: #e5e7eb;
}

/* Tabs */
.tabs {
  display: flex;
  padding: 12px;
  gap: 10px;
}

.tab {
  flex: 1;
  background: #0f172a;
  padding: 12px;
  text-align: center;
  border-radius: 14px;
  color: #9ca3af;
  font-weight: 600;
}

.tab.active {
  color: white;
  border-bottom: 3px solid #3b82f6;
}

/* Card */
.card {
  background: linear-gradient(180deg, #0f172a, #020617);
  margin: 15px;
  padding: 16px;
  border-radius: 18px;
  box-shadow: 0 0 35px rgba(0,0,0,0.8);
}

/* Player Row */
.player {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.left {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* Rank */
.rank {
  background: linear-gradient(135deg, #facc15, #eab308);
  padding: 12px;
  border-radius: 12px;
  font-weight: bold;
  color: black;
}

/* Avatar */
.avatar {
  width: 55px;
  height: 55px;
  border-radius: 12px;
}

/* Name */
.name {
  font-size: 18px;
  font-weight: 600;
}

/* Badge */
.badge {
  background: #7f1d1d;
  color: #f87171;
  padding: 6px 12px;
  border-radius: 12px;
  font-weight: 600;
}

/* Tier section */
.tiers {
  margin-top: 15px;
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
}

/* Tier circle */
.tier {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: #020617;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 2px solid #facc15;
  font-size: 11px;
}

/* Icon */
.icon {
  font-size: 16px;
}

/* Hover */
.card:hover {
  box-shadow: 0 0 50px rgba(255,255,255,0.1);
}
</style>

</head>
<body>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active">🏆 Overall</div>
  <div class="tab">⚔️ LTMs</div>
  <div class="tab">🧪 Vanilla</div>
</div>

<!-- Player 1 -->
<div class="card">
  <div class="player">
    <div class="left">
      <div class="rank">1</div>
      <img class="avatar" src="https://mc-heads.net/avatar/Steve">
      <div class="name">Marlo</div>
    </div>
    <div class="badge">NA</div>
  </div>

  <div class="tiers">
    <div class="tier"><div class="icon">🟢</div>HT1</div>
    <div class="tier"><div class="icon">⚔️</div>HT1</div>
    <div class="tier"><div class="icon">🔨</div>LT1</div>
    <div class="tier"><div class="icon">🧠</div>HT1</div>
    <div class="tier"><div class="icon">🧪</div>HT1</div>
    <div class="tier"><div class="icon">🛡️</div>HT1</div>
  </div>
</div>

<!-- Player 2 -->
<div class="card">
  <div class="player">
    <div class="left">
      <div class="rank">2</div>
      <img class="avatar" src="https://mc-heads.net/avatar/Alex">
      <div class="name">ItzReal</div>
    </div>
    <div class="badge">NA</div>
  </div>

  <div class="tiers">
    <div class="tier"><div class="icon">⚔️</div>HT3</div>
    <div class="tier"><div class="icon">🟢</div>HT1</div>
    <div class="tier"><div class="icon">🛡️</div>HT1</div>
    <div class="tier"><div class="icon">🧠</div>HT1</div>
    <div class="tier"><div class="icon">🧪</div>HT1</div>
    <div class="tier"><div class="icon">❤️</div>LT2</div>
  </div>
</div>

</body>
</html>
