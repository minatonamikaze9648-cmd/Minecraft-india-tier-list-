<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Ranking</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(180deg, #020617, #000);
  color: white;
}

.card {
  background: linear-gradient(180deg, #0f172a, #020617);
  margin: 12px;
  padding: 16px;
  border-radius: 18px;
  transition: 0.3s;
}

/* TOP 3 */
.rank1 {
  border: 2px solid gold;
  box-shadow: 0 0 30px gold;
  position: relative;
}

.rank1::before {
  content: "👑";
  position: absolute;
  right: 10px;
  top: -10px;
  font-size: 22px;
}

.rank2 {
  border: 2px solid silver;
  box-shadow: 0 0 20px silver;
}

.rank3 {
  border: 2px solid #cd7f32;
  box-shadow: 0 0 20px #cd7f32;
}

.player {
  display: flex;
  justify-content: space-between;
}

.left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.rank {
  background: linear-gradient(135deg, gold, orange);
  color: black;
  padding: 10px;
  border-radius: 10px;
  font-weight: bold;
}

.avatar {
  width: 50px;
  border-radius: 10px;
}

.name {
  font-weight: 700;
}

.badge {
  background: #7f1d1d;
  padding: 5px 10px;
  border-radius: 10px;
  color: #f87171;
}

.tiers {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 12px;
}

.tier {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: #000;
  border: 2px solid gold;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.tier img { width: 20px; }
.tier span { font-size: 10px; color: gold; }
</style>
</head>

<body>

<div id="app"></div>

<script>

// 🔥 NAME CONTROL (yaha se kisi ka bhi naam change kar)
let customNames = {
  1: "PS777GAMING",
  2: "DEATH SCAR",
  3: "LORDMADARAAA",
  10: "Rudra",   // example
  25: "Ankit"    // example
};

const icons = [
  "https://cdn-icons-png.flaticon.com/512/3523/3523887.png",
  "https://cdn-icons-png.flaticon.com/512/833/833472.png",
  "https://cdn-icons-png.flaticon.com/512/616/616494.png",
  "https://cdn-icons-png.flaticon.com/512/1040/1040230.png"
];

let players = [];

for (let i = 1; i <= 100; i++) {
  players.push({
    name: customNames[i] || "Player" + i,
    rank: i,
    avatar: i === 1
      ? "https://mc-heads.net/avatar/WhiteLuffy"
      : "https://mc-heads.net/avatar/" + (i % 2 === 0 ? "Steve" : "Alex"),
    tiers: [
      {icon: icons[Math.floor(Math.random()*icons.length)], text:"HT1"},
      {icon: icons[Math.floor(Math.random()*icons.length)], text:"LT1"},
      {icon: icons[Math.floor(Math.random()*icons.length)], text:"HT1"}
    ]
  });
}

const app = document.getElementById("app");

// Render
players.forEach((p) => {
  const card = document.createElement("div");
  card.className = "card";

  if(p.rank === 1) card.classList.add("rank1");
  if(p.rank === 2) card.classList.add("rank2");
  if(p.rank === 3) card.classList.add("rank3");

  card.innerHTML = `
    <div class="player">
      <div class="left">
        <div class="rank">${p.rank}</div>
        <img class="avatar" src="${p.avatar}">
        <div class="name">${p.name}</div>
      </div>
      <div class="badge">NA</div>
    </div>

    <div class="tiers">
      ${p.tiers.map(t => `
        <div class="tier">
          <img src="${t.icon}">
          <span>${t.text}</span>
        </div>
      `).join("")}
    </div>
  `;

  app.appendChild(card);
});
</script>

</body>
</html>
