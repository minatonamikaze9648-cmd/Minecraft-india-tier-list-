<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Ranking</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(180deg, #020617, #000);
  color: white;
}

/* Smooth scroll */
html {
  scroll-behavior: smooth;
}

/* Card */
.card {
  background: linear-gradient(180deg, #0f172a, #020617);
  margin: 12px;
  padding: 16px;
  border-radius: 18px;
  box-shadow: 0 0 25px rgba(0,0,0,0.9);
  animation: fadeUp 0.6s ease;
  transition: 0.3s;
}

/* Hover animation */
.card:hover {
  transform: translateY(-5px) scale(1.01);
  box-shadow: 0 0 40px rgba(255,255,255,0.08);
}

/* Top player golden */
.top {
  border: 2px solid gold;
  box-shadow: 0 0 25px gold;
}

/* Player row */
.player {
  display: flex;
  justify-content: space-between;
}

.left {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* Rank */
.rank {
  background: linear-gradient(135deg, gold, orange);
  color: black;
  padding: 10px;
  border-radius: 10px;
  font-weight: bold;
}

/* Avatar */
.avatar {
  width: 50px;
  border-radius: 10px;
}

/* Name */
.name {
  font-weight: 600;
}

/* Badge */
.badge {
  background: #7f1d1d;
  padding: 5px 10px;
  border-radius: 10px;
  color: #f87171;
}

/* Tiers */
.tiers {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 12px;
}

/* Tier bubble */
.tier {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: #000;
  border: 2px solid gold;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  animation: pop 0.4s ease;
}

/* Tier image */
.tier img {
  width: 20px;
}

/* Tier text */
.tier span {
  font-size: 10px;
  color: gold;
}

/* Animations */
@keyframes fadeUp {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

@keyframes pop {
  from {transform: scale(0.8);}
  to {transform: scale(1);}
}
</style>
</head>

<body>

<div id="app"></div>

<script>
const icons = [
  "https://cdn-icons-png.flaticon.com/512/3523/3523887.png",
  "https://cdn-icons-png.flaticon.com/512/833/833472.png",
  "https://cdn-icons-png.flaticon.com/512/616/616494.png",
  "https://cdn-icons-png.flaticon.com/512/1040/1040230.png"
];

// Fake DB
let players = [];

for (let i = 1; i <= 100; i++) {
  players.push({
    name: "Player" + i,
    rank: i,
    avatar: "https://mc-heads.net/avatar/" + (i % 2 === 0 ? "Steve" : "Alex"),
    tiers: [
      {icon: icons[Math.floor(Math.random()*icons.length)], text:"HT1"},
      {icon: icons[Math.floor(Math.random()*icons.length)], text:"LT1"},
      {icon: icons[Math.floor(Math.random()*icons.length)], text:"HT1"}
    ]
  });
}

const app = document.getElementById("app");

// Render
players.forEach((p, index) => {
  const card = document.createElement("div");
  card.className = "card";

  if(index === 0) card.classList.add("top");

  card.innerHTML = `
    <div class="player">
      <div class="left">
        <div class="rank">${p.rank}</div>
        <img class="avatar" src="${p.avatar}">
        <div class="name">${p.name}</div>
      </div>
      <div class="badge">NA</div>
    </div>

    <div class="tiers">
      ${p.tiers.map(t => `
        <div class="tier">
          <img src="${t.icon}">
          <span>${t.text}</span>
        </div>
      `).join("")}
    </div>
  `;

  app.appendChild(card);
});
</script>

</body>
</html>
