
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Ranking</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(180deg, #020617, #000);
  color: white;
}

/* 🔥 HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px;
}

.logo {
  font-size: 22px;
  font-weight: 800;
  background: linear-gradient(90deg, gold, orange);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.search {
  flex: 1;
  margin-left: 10px;
}

.search input {
  width: 100%;
  padding: 10px;
  border-radius: 20px;
  border: none;
  outline: none;
  background: #0f172a;
  color: white;
}

/* 🔥 MENU */
.menu {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 12px;
}

.menu-item {
  min-width: 90px;
  text-align: center;
  background: #0f172a;
  border-radius: 12px;
  padding: 10px;
  transition: 0.3s;
  border: 2px solid transparent;
}

.menu-item img {
  width: 28px;
}

.menu-item span {
  font-size: 12px;
}

.menu-item.active {
  border: 2px solid gold;
  box-shadow: 0 0 10px gold;
}

/* CARDS */
.card {
  background: linear-gradient(180deg, #0f172a, #020617);
  margin: 12px;
  padding: 16px;
  border-radius: 18px;
}

/* 🔥 TOP 3 PROFILE UPGRADE */
.rank1 {
  border: 2px solid gold;
  box-shadow: 0 0 30px gold;
  background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,140,0,0.08));
}

.rank2 {
  border: 2px solid silver;
  box-shadow: 0 0 20px rgba(192,192,192,0.6);
  background: linear-gradient(135deg, rgba(192,192,192,0.15), rgba(120,120,120,0.08));
}

.rank3 {
  border: 2px solid #cd7f32;
  box-shadow: 0 0 20px rgba(205,127,50,0.6);
  background: linear-gradient(135deg, rgba(205,127,50,0.15), rgba(139,69,19,0.08));
}

.player {
  display: flex;
  justify-content: space-between;
}

.left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.rank {
  background: linear-gradient(135deg, gold, orange);
  color: black;
  padding: 10px;
  border-radius: 10px;
}

/* 🔥 RANK BADGE COLOR */
.rank1 .rank {
  background: linear-gradient(135deg, gold, orange);
}

.rank2 .rank {
  background: linear-gradient(135deg, #c0c0c0, #808080);
}

.rank3 .rank {
  background: linear-gradient(135deg, #cd7f32, #8b4513);
}

.avatar { width: 50px; border-radius: 10px; }

.name { font-weight: 700; }

/* 🔥 NAME COLOR */
.rank1 .name {
  color: gold;
  text-shadow: 0 0 10px gold;
}

.rank2 .name {
  color: silver;
  text-shadow: 0 0 8px silver;
}

.rank3 .name {
  color: #cd7f32;
  text-shadow: 0 0 8px #cd7f32;
}

.badge {
  background: #7f1d1d;
  padding: 5px 10px;
  border-radius: 10px;
}

.tiers {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.tier {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  background: black;
  border: 2px solid gold;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.tier img { width: 18px; }
.tier span { font-size: 10px; }
</style>
</head>

<body>

<div class="header">
  <div class="logo">MCTIERS</div>
  <div class="search">
    <input type="text" id="searchInput" placeholder="Search player...">
  </div>
</div>

<div class="menu" id="menu"></div>

<div id="app"></div>

<script>

// 🔥 MENU
const menuItems = [
  {name:"Vanilla", icon:"https://cdn-icons-png.flaticon.com/512/1040/1040230.png"},
  {name:"UHC", icon:"https://cdn-icons-png.flaticon.com/512/833/833472.png"},
  {name:"Pot", icon:"https://cdn-icons-png.flaticon.com/512/3523/3523887.png"},
  {name:"NethOP", icon:"https://cdn-icons-png.flaticon.com/512/616/616494.png"},
  {name:"SMP", icon:"https://cdn-icons-png.flaticon.com/512/1828/1828919.png"},
  {name:"Sword", icon:"https://cdn-icons-png.flaticon.com/512/3075/3075977.png"},
  {name:"Axe", icon:"https://cdn-icons-png.flaticon.com/512/3523/3523063.png"},
  {name:"Mace", icon:"https://cdn-icons-png.flaticon.com/512/3523/3523033.png"},
  {name:"TNT Cart", icon:"https://cdn-icons-png.flaticon.com/512/616/616408.png"}
];

const menu = document.getElementById("menu");

menuItems.forEach((item, index) => {
  const div = document.createElement("div");
  div.className = "menu-item";
  if(index === 0) div.classList.add("active");

  div.innerHTML = `<img src="${item.icon}"><span>${item.name}</span>`;

  div.addEventListener("click", () => {
    document.querySelectorAll(".menu-item").forEach(el => el.classList.remove("active"));
    div.classList.add("active");
  });

  menu.appendChild(div);
});

// 🔥 NAMES
let customNames = {
  1: "PS777GAMING",
  2: "DEATH SCAR",
  3: "LORDMADARAAA"
};

const icons = [
  "https://cdn-icons-png.flaticon.com/512/3523/3523887.png",
  "https://cdn-icons-png.flaticon.com/512/833/833472.png"
];

let players = [];

for (let i = 1; i <= 100; i++) {
  players.push({
    name: customNames[i] || "Player" + i,
    rank: i,
    avatar: "https://mc-heads.net/avatar/" + (i % 2 === 0 ? "Steve" : "Alex"),
    tiers: [
      {icon: icons[0], text:"HT1"},
      {icon: icons[1], text:"LT1"}
    ]
  });
}

const app = document.getElementById("app");

// 🔥 RENDER FUNCTION
function render(list) {
  app.innerHTML = "";
  
  list.forEach((p) => {
    const card = document.createElement("div");
    card.className = "card";

    if(p.rank === 1) card.classList.add("rank1");
    if(p.rank === 2) card.classList.add("rank2");
    if(p.rank === 3) card.classList.add("rank3");

    card.innerHTML = `
      <div class="player">
        <div class="left">
          <div class="rank">${p.rank}</div>
          <img class="avatar" src="${p.avatar}">
          <div class="name">${p.name}</div>
        </div>
        <div class="badge">NA</div>
      </div>

      <div class="tiers">
        ${p.tiers.map(t => `
          <div class="tier">
            <img src="${t.icon}">
            <span>${t.text}</span>
          </div>
        `).join("")}
      </div>
    `;

    app.appendChild(card);
  });
}

// 🔥 SEARCH FIX
document.getElementById("searchInput").addEventListener("input", (e) => {
  const value = e.target.value.toLowerCase();
  const filtered = players.filter(p => p.name.toLowerCase().includes(value));
  render(filtered);
});

// first render
render(players);

</script>

</body>
</html>
